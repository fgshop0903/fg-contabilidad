<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | FG Network</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #1370b6;
            --primary-dark: #0e5a94;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            /* Fondo estilo Fintech con esferas de color difusas */
            background-image: 
                radial-gradient(at 0% 0%, rgba(19, 112, 182, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(19, 112, 182, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(19, 112, 182, 0.3);
        }

        h2 {
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        /* Estilización de los campos de Django form.as_p */
        form p {
            margin-bottom: 20px;
        }

        form label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        form input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            transition: all 0.3s;
            color: var(--text-main);
        }

        form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(19, 112, 182, 0.1);
            background: white;
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(19, 112, 182, 0.2);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(19, 112, 182, 0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* Decoración de fondo */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.1;
            z-index: 1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="blob" style="top: 10%; left: 10%;"></div>
    <div class="blob" style="bottom: 10%; right: 10%;"></div>

    <div class="login-container">
        <div class="glass-card">
            <div class="brand-logo">
                <i class="fa-solid fa-building-columns"></i>
            </div>
            
            <h2>FG Network</h2>
            <p class="subtitle">Sistema de Gestión Financiera</p>

            <form method="post">
                {% csrf_token %}
                
                {# Django insertará los inputs aquí #}
                {{ form.as_p }}

                <button type="submit" class="btn-login">
                    Iniciar Sesión <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                </button>
            </form>

            <div class="footer-text">
                &copy; 2026 Diedev. Todos los derechos reservados.
            </div>
        </div>
    </div>

    <!-- Script para mejorar los inputs de Django dinámicamente -->
    <script>
        document.querySelectorAll('form input').forEach(input => {
            input.placeholder = '••••••••';
            if (input.type === 'text') input.placeholder = 'Usuario';
        });
    </script>
</body>
</html>
